<svg viewBox="0 0 1160 760" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <defs>
    <marker id="crow" markerWidth="14" markerHeight="14" refX="10" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10" fill="none" stroke="#64748b" stroke-width="1.5"/>
    </marker>
  </defs>
  <rect width="1160" height="760" fill="#f8fafc"/>

  <!-- Title -->
  <text x="580" y="34" text-anchor="middle" font-size="20" font-weight="700" fill="#0f172a">Weekly Report Generator &amp; Team Dashboard — ER Diagram (PostgreSQL)</text>

  <!-- USERS table -->
  <g>
    <rect x="60" y="90" width="260" height="230" rx="10" fill="#ffffff" stroke="#3763f2" stroke-width="2"/>
    <rect x="60" y="90" width="260" height="36" rx="10" fill="#3763f2"/>
    <rect x="60" y="112" width="260" height="14" fill="#3763f2"/>
    <text x="190" y="114" text-anchor="middle" font-size="15" font-weight="700" fill="#ffffff">users</text>
    <text x="76" y="150" font-size="13" fill="#0f172a">PK  id (uuid)</text>
    <text x="76" y="172" font-size="13" fill="#334155">name (varchar)</text>
    <text x="76" y="194" font-size="13" fill="#334155">email (varchar, unique)</text>
    <text x="76" y="216" font-size="13" fill="#334155">password (varchar, hashed)</text>
    <text x="76" y="238" font-size="13" fill="#334155">role (enum: member | manager)</text>
    <text x="76" y="260" font-size="13" fill="#334155">createdAt / updatedAt</text>
  </g>

  <!-- PROJECTS table -->
  <g>
    <rect x="460" y="90" width="260" height="200" rx="10" fill="#ffffff" stroke="#f59e0b" stroke-width="2"/>
    <rect x="460" y="90" width="260" height="36" rx="10" fill="#f59e0b"/>
    <rect x="460" y="112" width="260" height="14" fill="#f59e0b"/>
    <text x="590" y="114" text-anchor="middle" font-size="15" font-weight="700" fill="#ffffff">projects</text>
    <text x="476" y="150" font-size="13" fill="#0f172a">PK  id (uuid)</text>
    <text x="476" y="172" font-size="13" fill="#334155">name (varchar, unique)</text>
    <text x="476" y="194" font-size="13" fill="#334155">description (text)</text>
    <text x="476" y="216" font-size="13" fill="#334155">isActive (boolean)</text>
    <text x="476" y="238" font-size="13" fill="#334155">FK createdById → users.id</text>
    <text x="476" y="260" font-size="13" fill="#334155">createdAt / updatedAt</text>
  </g>

  <!-- REPORTS table -->
  <g>
    <rect x="860" y="90" width="260" height="330" rx="10" fill="#ffffff" stroke="#10b981" stroke-width="2"/>
    <rect x="860" y="90" width="260" height="36" rx="10" fill="#10b981"/>
    <rect x="860" y="112" width="260" height="14" fill="#10b981"/>
    <text x="990" y="114" text-anchor="middle" font-size="15" font-weight="700" fill="#ffffff">reports</text>
    <text x="876" y="150" font-size="13" fill="#0f172a">PK  id (uuid)</text>
    <text x="876" y="172" font-size="13" fill="#334155">FK userId → users.id</text>
    <text x="876" y="194" font-size="13" fill="#334155">FK projectId → projects.id</text>
    <text x="876" y="216" font-size="13" fill="#334155">weekStart / weekEnd (date)</text>
    <text x="876" y="238" font-size="13" fill="#334155">tasksCompleted (text)</text>
    <text x="876" y="260" font-size="13" fill="#334155">tasksPlanned (text)</text>
    <text x="876" y="282" font-size="13" fill="#334155">blockers (text)</text>
    <text x="876" y="304" font-size="13" fill="#334155">hoursWorked (float)</text>
    <text x="876" y="326" font-size="13" fill="#334155">notes (text)</text>
    <text x="876" y="348" font-size="13" fill="#334155">status (enum: draft | submitted)</text>
    <text x="876" y="370" font-size="13" fill="#334155">submittedAt (timestamp)</text>
    <text x="876" y="392" font-size="13" fill="#334155">unique(userId, weekStart, projectId)</text>
  </g>

  <!-- Relationship: users 1 to many reports -->
  <line x1="320" y1="150" x2="860" y2="180" stroke="#64748b" stroke-width="1.5" marker-end="url(#crow)"/>
  <text x="520" y="150" font-size="13" fill="#475569" text-anchor="middle">1 submits many</text>
  <text x="520" y="168" font-size="12" fill="#94a3b8" text-anchor="middle">(one user → many reports, CASCADE on delete)</text>

  <!-- Relationship: projects 1 to many reports -->
  <line x1="720" y1="200" x2="860" y2="220" stroke="#64748b" stroke-width="1.5" marker-end="url(#crow)"/>
  <text x="770" y="205" font-size="12" fill="#475569" text-anchor="middle">1..*</text>

  <!-- Relationship: User created Project (manager) -->
  <path d="M190 320 C 190 420, 460 420, 460 240" fill="none" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="5,4" marker-end="url(#crow)"/>
  <text x="330" y="435" font-size="12" fill="#94a3b8" text-anchor="middle">manager creates project (0..*)</text>

  <!-- Legend / Notes -->
  <g>
    <rect x="60" y="470" width="1040" height="250" rx="10" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5"/>
    <text x="80" y="500" font-size="14" font-weight="700" fill="#0f172a">Design Notes</text>
    <text x="80" y="528" font-size="13" fill="#334155">• A report always belongs to exactly one user (the submitter) and exactly one project — role-based access is</text>
    <text x="96" y="548" font-size="13" fill="#334155">  enforced at the API layer: members only ever read/write reports where reports.userId === req.user.id.</text>
    <text x="80" y="574" font-size="13" fill="#334155">• A composite unique index on (userId, weekStart, projectId) prevents duplicate submissions for the same</text>
    <text x="96" y="594" font-size="13" fill="#334155">  week/project — enforced by Postgres itself, not just application logic.</text>
    <text x="80" y="620" font-size="13" fill="#334155">• Report fields are fixed and identical for every user (same columns, same order) — enforced by the Sequelize</text>
    <text x="96" y="640" font-size="13" fill="#334155">  model definition and mirrored by a single shared React form component, so no user can add/reorder fields.</text>
    <text x="80" y="666" font-size="13" fill="#334155">• role and status are native PostgreSQL ENUM types, so the database itself rejects invalid values.</text>
    <text x="80" y="692" font-size="13" fill="#334155">• Manager-only aggregation queries (summary metrics, trends, workload) use SQL GROUP BY / SUM / COUNT via</text>
    <text x="96" y="712" font-size="13" fill="#334155">  Sequelize — no separate analytics table is needed.</text>
  </g>
</svg>
